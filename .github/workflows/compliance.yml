name: Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  folder-check:
    runs-on: ubuntu-latest
    name: trugs-folder-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install trugs-tools
        run: pip install trugs-tools

      - name: Validate folder.trug.json
        run: trugs-folder-check .
