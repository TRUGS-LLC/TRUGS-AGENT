name: Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: trug validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Consume-not-vendor (Xepayac/TRUGS-DEVELOPMENT#3086): validation uses the
      # published, open TRUGS CLIs — no hand-vendored validator to drift.
      - name: Install the published TRUGS CLIs
        run: pip install trugs-tools trugs-folder

      - name: Folder-graph integrity (trug-a-folder check)
        run: trug-a-folder check .

      - name: Validate shipped TRUGs (trug validate)
        # Validate every shipped graph against the 16 CORE rules with the real
        # `trug` validator (exit code, not output-grep). EXCLUDE
        # AAA/AAA_REFERENCE_for_LLM.trug.json: it has a pre-existing STRUCTURAL
        # break (metric_level "STANDARD" is not an SI prefix) tracked at
        # Xepayac/TRUGS-DEVELOPMENT#3082 — unrelated to CORE v1 retirement.
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! trug validate "$f" >/dev/null 2>&1; then
              echo "::error::INVALID $f"
              trug validate "$f" | tail -20
              fail=1
            fi
          done < <(find . -name '*.trug.json' -not -path './.git/*' \
                     -not -name 'AAA_REFERENCE_for_LLM.trug.json' -print0)
          if [ "$fail" -eq 0 ]; then
            echo "All shipped TRUGs VALID (excl. #3082 AAA_REFERENCE_for_LLM.trug.json)."
          fi
          exit $fail
